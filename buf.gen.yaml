version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/bmcpi/esp32-p4-kvm/pkg/proto
plugins:
  - local: ["go", "tool", "protoc-gen-go-lite"]
    out: pkg/proto
    opt:
      - paths=source_relative
      - features=marshal+unmarshal+size+equal+clone+json
inputs:
  - directory: pkg/proto
